<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>采购谈判风格测试 - 测测你的谈判超能力</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; border-radius: 16px; padding: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        .hidden { display: none !important; }
        
        /* 首页 */
        .hero { text-align: center; padding: 40px 0; }
        .hero h1 { font-size: 28px; font-weight: 700; color: #333; margin-bottom: 10px; }
        .hero p { font-size: 16px; color: #666; margin-bottom: 30px; }
        .hero-stats { display: flex; justify-content: center; gap: 30px; margin: 30px 0; }
        .stat-item { text-align: center; }
        .stat-num { font-size: 32px; font-weight: bold; color: #667eea; }
        .stat-label { font-size: 12px; color: #999; }
        .btn-start { display: block; width: 100%; padding: 18px; background: linear-gradient(90deg, #667eea, #764ba2); color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: 600; cursor: pointer; margin-top: 30px; }
        
        /* 测试页 */
        .progress { background: #e0e0e0; border-radius: 10px; height: 8px; margin-bottom: 20px; overflow: hidden; }
        .progress-bar { background: linear-gradient(90deg, #667eea, #764ba2); height: 100%; width: 3.57%; transition: width 0.3s; }
        .progress-text { text-align: center; color: #666; font-size: 14px; margin-bottom: 20px; }
        .question { font-size: 18px; font-weight: 600; color: #333; margin-bottom: 25px; line-height: 1.6; }
        .options { display: flex; flex-direction: column; gap: 12px; }
        .option { padding: 15px 20px; border: 2px solid #e0e0e0; border-radius: 12px; cursor: pointer; transition: all 0.2s; }
        .option:hover { border-color: #667eea; background: #f5f6ff; }
        .option.selected { border-color: #667eea; background: #667eea; color: white; }
        .option-label { font-weight: 600; margin-bottom: 5px; }
        .option-text { font-size: 14px; line-height: 1.5; }
        .nav-buttons { display: flex; justify-content: space-between; margin-top: 30px; gap: 10px; }
        .btn { padding: 12px 24px; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; transition: all 0.2s; }
        .btn-prev { background: #f0f0f0; color: #666; }
        .btn-prev:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-next { background: linear-gradient(90deg, #667eea, #764ba2); color: white; }
        .footer { text-align: center; margin-top: 20px; color: #999; font-size: 12px; }
        
        /* 结果页 */
        .result-header { text-align: center; margin-bottom: 30px; }
        .animal { font-size: 80px; margin-bottom: 10px; }
        .code { font-size: 36px; font-weight: bold; color: #667eea; margin-bottom: 5px; }
        .name { font-size: 24px; font-weight: 600; color: #333; margin-bottom: 5px; }
        .role { font-size: 16px; color: #666; margin-bottom: 10px; }
        .result-stats { display: flex; justify-content: space-around; margin: 20px 0; }
        .result-stat { text-align: center; }
        .result-stat-value { font-size: 20px; font-weight: bold; color: #667eea; }
        .result-stat-label { font-size: 12px; color: #999; }
        .section { margin: 25px 0; padding: 20px; background: #f8f9ff; border-radius: 12px; }
        .section-title { font-size: 18px; font-weight: 600; color: #333; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        .item { margin: 12px 0; padding: 12px; background: white; border-radius: 8px; }
        .item-label { font-size: 14px; font-weight: 600; color: #667eea; margin-bottom: 5px; }
        .item-text { font-size: 14px; color: #666; line-height: 1.6; }
        .tags { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
        .tag { padding: 6px 12px; background: #667eea; color: white; border-radius: 20px; font-size: 12px; }
        .radar-container { width: 100%; height: 250px; margin: 20px 0; }
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        .btn-share { flex: 1; padding: 15px; background: linear-gradient(90deg, #667eea, #764ba2); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; }
        .btn-retake { flex: 1; padding: 15px; background: #f0f0f0; color: #666; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <!-- 首页 -->
        <div id="homePage">
            <div class="hero">
                <h1>🎯 采购谈判风格测试</h1>
                <p>28 道题，3 分钟，发现你的谈判超能力</p>
                <div class="hero-stats">
                    <div class="stat-item">
                        <div class="stat-num">28</div>
                        <div class="stat-label">测试题目</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-num">16</div>
                        <div class="stat-label">谈判风格</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-num">10000+</div>
                        <div class="stat-label">已参与测试</div>
                    </div>
                </div>
                <button class="btn-start" onclick="startTest()">🚀 开始测试</button>
            </div>
        </div>

        <!-- 测试页 -->
        <div id="testPage" class="hidden">
            <div class="progress">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <div class="progress-text" id="progressText">1 / 28</div>
            <div class="question" id="questionText">加载中...</div>
            <div class="options" id="optionsContainer"></div>
            <div class="nav-buttons">
                <button class="btn btn-prev" id="prevBtn" onclick="prevQuestion()">← 上一题</button>
                <button class="btn btn-next" id="nextBtn" onclick="nextQuestion()">下一题 →</button>
            </div>
            <div class="footer">请根据第一反应选择</div>
        </div>

        <!-- 结果页 -->
        <div id="resultPage" class="hidden">
            <div class="result-header">
                <div class="animal" id="animal">🦉</div>
                <div class="code" id="code">ARCD</div>
                <div class="name" id="name">战略架构师</div>
                <div class="role" id="role">战略策划者</div>
                <div class="result-stats">
                    <div class="result-stat">
                        <div class="result-stat-value" id="saving">15-25%</div>
                        <div class="result-stat-label">年省潜力</div>
                    </div>
                    <div class="result-stat">
                        <div class="result-stat-value" id="rarity">约 5%</div>
                        <div class="result-stat-label">稀有度</div>
                    </div>
                </div>
            </div>

            <div class="section">
                <div class="section-title">📊 能力雷达图</div>
                <canvas id="radarChart" class="radar-container"></canvas>
            </div>

            <div class="section">
                <div class="section-title">🎯 谈判运势</div>
                <div class="item">
                    <div class="item-label">本周建议</div>
                    <div class="item-text" id="fortune"></div>
                </div>
            </div>

            <div class="section">
                <div class="section-title">💰 财运指数</div>
                <div class="item">
                    <div class="item-label" id="money-label"></div>
                    <div class="item-text" id="money"></div>
                </div>
            </div>

            <div class="section">
                <div class="section-title">❤️ 配对指数</div>
                <div class="item">
                    <div class="item-label">最佳搭档</div>
                    <div class="item-text" id="partner"></div>
                </div>
            </div>

            <div class="section">
                <div class="section-title">🏷️ 神秘标签</div>
                <div class="tags" id="tags"></div>
            </div>

            <div class="section">
                <div class="section-title">💼 职业建议</div>
                <div class="item">
                    <div class="item-text" id="career"></div>
                </div>
            </div>

            <div class="btn-group">
                <button class="btn-share" onclick="shareResult()">📤 分享我的结果</button>
                <button class="btn-retake" onclick="retakeTest()">🔄 重新测试</button>
            </div>
        </div>
    </div>

            {id:2,text:"面对新的采购品类，你会：",options:[{label:'A',text:'先做充分的市场调研和技术分析',score:'A'},{label:'B',text:'快速尝试，在实践中学习和调整',score:'I'},{label:'C',text:'找专家咨询，听取专业意见',score:'I'},{label:'D',text:'制定详细的评估标准和流程',score:'A'}]},

        // 16 种风格数据
        const styles = {

        let currentIndex = 0;
        let answers = [];

        // 开始测试
        function startTest() {
            document.getElementById('homePage').classList.add('hidden');
            document.getElementById('testPage').classList.remove('hidden');
            renderQuestion();
            updateProgress();
        }

        // 渲染题目
        function renderQuestion() {
            const q = questions[currentIndex];
            document.getElementById('questionText').textContent = q.text;
            const container = document.getElementById('optionsContainer');
            container.innerHTML = '';
            q.options.forEach(opt => {
                const div = document.createElement('div');
                div.className = 'option';
                if (answers[currentIndex] === opt.score) div.classList.add('selected');
                div.onclick = () => selectOption(opt.score);
                div.innerHTML = '<div class="option-label">' + opt.label + '</div><div class="option-text">' + opt.text + '</div>';
                container.appendChild(div);
            });
            updateNav();
        }

        // 选择选项
        function selectOption(score) {
            answers[currentIndex] = score;
            document.querySelectorAll('.option').forEach(el => el.classList.remove('selected'));
            event.currentTarget.classList.add('selected');
            setTimeout(() => {
                if (currentIndex < 27) nextQuestion();
            }, 300);
        }

        // 上一题
        function prevQuestion() {
            if (currentIndex > 0) {
                currentIndex--;
                renderQuestion();
                updateProgress();
            }
        }

        // 下一题
        function nextQuestion() {
            if (!answers[currentIndex]) {
                alert('请先选择');
                return;
            }
            if (currentIndex < 27) {
                currentIndex++;
                renderQuestion();
                updateProgress();
            } else {
                calculateResult();
            }
        }

        // 计算结果
        function calculateResult() {
            let scores = {A:0, I:0, R:0, T:0, C:0, B:0, D:0, P:0};
            questions.forEach((q, i) => {
                const answer = answers[i];
                if (answer) scores[answer]++;
            });
            const dim1 = scores.A >= 4 ? 'A' : 'I';
            const dim2 = scores.R >= 4 ? 'R' : 'T';
            const dim3 = scores.C >= 4 ? 'C' : 'B';
            const dim4 = scores.D >= 4 ? 'D' : 'P';
            const code = dim1 + dim2 + dim3 + dim4;
            showResult(code, scores);
        }

        // 显示结果
        function showResult(code, scores) {
            document.getElementById('testPage').classList.add('hidden');
            document.getElementById('resultPage').classList.remove('hidden');
            const style = styles[code];
            document.getElementById('animal').textContent = style.animal;
            document.getElementById('code').textContent = code;
            document.getElementById('name').textContent = style.name;
            document.getElementById('role').textContent = style.role;
            document.getElementById('saving').textContent = style.saving;
            document.getElementById('rarity').textContent = style.rarity;
            document.getElementById('fortune').textContent = style.fortune;
            document.getElementById('money-label').textContent = '年省潜力 ' + style.saving;
            document.getElementById('money').textContent = style.money;
            document.getElementById('partner').textContent = style.partner;
            document.getElementById('career').textContent = style.career;
            const tagsContainer = document.getElementById('tags');
            tagsContainer.innerHTML = '';
            style.tags.forEach(tag => {
                const span = document.createElement('span');
                span.className = 'tag';
                span.textContent = tag;
                tagsContainer.appendChild(span);
            });
            drawRadar(scores);
        }

        // 绘制雷达图
        function drawRadar(scores) {
            const canvas = document.getElementById('radarChart');
            const ctx = canvas.getContext('2d');
            canvas.width = canvas.offsetWidth * 2;
            canvas.height = canvas.offsetHeight * 2;
            ctx.scale(2, 2);
            const width = canvas.offsetWidth;
            const height = canvas.offsetHeight;
            const centerX = width / 2;
            const centerY = height / 2;
            const radius = Math.min(width, height) / 2 - 20;
            const dims = {'分析': scores.A || 0,'直觉': scores.I || 0,'关系': scores.R || 0,'任务': scores.T || 0,'谨慎': scores.C || 0,'大胆': scores.B || 0,'直接': scores.D || 0,'说服': scores.P || 0};
            ctx.strokeStyle = '#e0e0e0';
            ctx.lineWidth = 1;
            for (let i = 1; i <= 4; i++) {
                const r = radius * i / 4;
                ctx.beginPath();
                ctx.arc(centerX, centerY, r, 0, Math.PI * 2);
                ctx.stroke();
            }
            const labels = ['分析', '关系', '谨慎', '直接', '直觉', '任务', '大胆', '说服'];
            const angles = [-Math.PI/2, -Math.PI/4, 0, Math.PI/4, Math.PI/2, Math.PI*3/4, Math.PI, Math.PI*5/4];
            labels.forEach((label, i) => {
                const angle = angles[i];
                const x = centerX + Math.cos(angle) * radius;
                const y = centerY + Math.sin(angle) * radius;
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.lineTo(x, y);
                ctx.strokeStyle = '#e0e0e0';
                ctx.stroke();
                ctx.fillStyle = '#666';
                ctx.font = '12px sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                const lx = centerX + Math.cos(angle) * (radius + 20);
                const ly = centerY + Math.sin(angle) * (radius + 20);
                ctx.fillText(label, lx, ly);
            });
            const values = [dims['分析']/7, dims['关系']/7, dims['谨慎']/7, dims['直接']/7, dims['直觉']/7, dims['任务']/7, dims['大胆']/7, dims['说服']/7];
            ctx.beginPath();
            values.forEach((val, i) => {
                const angle = angles[i];
                const r = radius * val;
                const x = centerX + Math.cos(angle) * r;
                const y = centerY + Math.sin(angle) * r;
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            });
            ctx.closePath();
            ctx.fillStyle = 'rgba(102, 126, 234, 0.3)';
            ctx.fill();
            ctx.strokeStyle = '#667eea';
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        // 分享结果
        function shareResult() {
            const code = document.getElementById('code').textContent;
            const name = document.getElementById('name').textContent;
            const animal = document.getElementById('animal').textContent;
            const text = `我是${animal}${name}（${code}），年省潜力${document.getElementById('saving').textContent}！测测你是什么谈判风格？`;
            if (navigator.share) {
                navigator.share({title:'我的谈判风格',text:text,url:window.location.href});
            } else {
                navigator.clipboard.writeText(text + ' ' + window.location.href);
                alert('已复制到剪贴板！');
            }
        }

        // 重新测试
        function retakeTest() {
            answers = [];
            currentIndex = 0;
            document.getElementById('resultPage').classList.add('hidden');
            document.getElementById('homePage').classList.remove('hidden');
        }

        // 更新进度
        function updateProgress() {
            const pct = ((currentIndex + 1) / 28) * 100;
            document.getElementById('progressBar').style.width = pct + '%';
            document.getElementById('progressText').textContent = (currentIndex + 1) + ' / 28';
        }

        // 更新导航
        function updateNav() {
            document.getElementById('prevBtn').disabled = currentIndex === 0;
            document.getElementById('nextBtn').innerHTML = currentIndex === 27 ? '查看结果 →' : '下一题 →';
        }
    </script>
