<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试问题诊断</title>
</head>
<body>
    <h1>诊断页面</h1>
    <div id="status"></div>
    <button onclick="testStart()">测试开始按钮</button>
    
    <script src="questions-v4.js"></script>
    <script src="styles-v2.js"></script>
    <script>
        var statusDiv = document.getElementById('status');
        var logs = [];
        
        function log(msg) {
            logs.push(msg);
            statusDiv.innerHTML = '<pre>' + logs.join('\n') + '</pre>';
            console.log(msg);
        }
        
        // 测试 1: questions-v4.js 加载
        try {
            if (typeof questions !== 'undefined' && Array.isArray(questions)) {
                log('✅ questions-v4.js 加载成功，共 ' + questions.length + ' 题');
            } else {
                log('❌ questions 变量不存在或不是数组');
            }
        } catch(e) {
            log('❌ questions-v4.js 加载失败：' + e.message);
        }
        
        // 测试 2: styles-v2.js 加载
        try {
            if (typeof styles !== 'undefined' && typeof styles === 'object') {
                log('✅ styles-v2.js 加载成功，共 ' + Object.keys(styles).length + ' 种风格');
            } else {
                log('❌ styles 变量不存在或不是对象');
            }
        } catch(e) {
            log('❌ styles-v2.js 加载失败：' + e.message);
        }
        
        // 测试 3: 测试开始函数
        function testStart() {
            log('🔘 开始按钮被点击');
            if (typeof questions === 'undefined') {
                log('❌ questions 未定义！');
            } else {
                log('✅ questions 已定义');
                log('📋 第 1 题：' + questions[0].q);
            }
        }
        
        log('页面加载完成');
    </script>
</body>
</html>
