<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>仪表盘测试</title>
<style>
body{background:#1a3a4a;color:#fff;font-family:-apple-system,sans-serif;padding:20px;margin:0;}
.card{background:rgba(32,58,67,0.7);border-radius:16px;padding:20px;margin-bottom:16px;border:1px solid rgba(58,106,122,0.3);}
.btn{width:100%;min-height:44px;border:none;border-radius:980px;font-size:14px;font-weight:600;cursor:pointer;margin-bottom:8px;padding:14px 28px;}
.btn-gold{background:linear-gradient(135deg,#2c5364,#d4af37);color:#0f2027;}
.btn-blue{background:rgba(44,83,100,0.8);color:#fff;border:2px solid #d4af37;}
.btn-red{background:rgba(239,68,68,0.2);color:#ef4444;border:2px solid #ef4444;}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px;}
.stat{background:rgba(44,83,100,0.3);padding:16px;border-radius:12px;text-align:center;}
.stat-num{font-size:24px;font-weight:800;color:#d4af37;}
.stat-label{font-size:11px;color:#86868b;}
.member{display:flex;align-items:center;padding:12px;background:rgba(44,83,100,0.2);border-radius:8px;margin-bottom:8px;}
.avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#2c5364,#d4af37);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#0f2027;margin-right:12px;}
</style>
</head>
<body>
<div id="dashboard" style="display:none;">
<div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;">
<button onclick="location.href='/'" style="background:transparent;border:none;color:#fff;font-size:24px;">←</button>
<div style="flex:1;">
<div style="font-size:18px;font-weight:700;color:#fff;">示例团队 - 采购精英队</div>
<div style="font-size:12px;color:#86868b;">邀请码：DEMO1234</div>
</div>
<button onclick="alert('DEMO1234')" style="background:rgba(212,175,55,0.2);border:1px solid #d4af37;color:#d4af37;padding:8px 16px;border-radius:980px;font-size:12px;">📋 复制</button>
</div>

<div class="stats">
<div class="stat"><div class="stat-num">5</div><div class="stat-label">总人数</div></div>
<div class="stat"><div class="stat-num">5</div><div class="stat-label">已测试</div></div>
<div class="stat"><div class="stat-num">0</div><div class="stat-label">待测试</div></div>
</div>

<div class="card">
<div style="font-size:16px;font-weight:700;color:#fff;margin-bottom:16px;">📊 团队成员</div>
<div class="member"><div class="avatar">张</div><div style="flex:1;"><div style="font-size:14px;font-weight:600;color:#fff;">张三</div><div style="font-size:11px;color:#86868b;">ARCD</div></div><div style="color:#10b981;">✅</div></div>
<div class="member"><div class="avatar">李</div><div style="flex:1;"><div style="font-size:14px;font-weight:600;color:#fff;">李四</div><div style="font-size:11px;color:#86868b;">ITCP</div></div><div style="color:#10b981;">✅</div></div>
<div class="member"><div class="avatar">王</div><div style="flex:1;"><div style="font-size:14px;font-weight:600;color:#fff;">王五</div><div style="font-size:11px;color:#86868b;">ARBP</div></div><div style="color:#10b981;">✅</div></div>
<div class="member"><div class="avatar">赵</div><div style="flex:1;"><div style="font-size:14px;font-weight:600;color:#fff;">赵六</div><div style="font-size:11px;color:#86868b;">ATCD</div></div><div style="color:#10b981;">✅</div></div>
<div class="member"><div class="avatar">钱</div><div style="flex:1;"><div style="font-size:14px;font-weight:600;color:#fff;">钱七</div><div style="font-size:11px;color:#86868b;">IRCD</div></div><div style="color:#10b981;">✅</div></div>
</div>

<div class="card">
<div style="font-size:16px;font-weight:700;color:#fff;margin-bottom:16px;">🔍 风格分布</div>
<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(58,106,122,0.3);"><span style="color:#fff;">ARCD</span><span style="color:#d4af37;font-weight:700;">1 人</span></div>
<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(58,106,122,0.3);"><span style="color:#fff;">ITCP</span><span style="color:#d4af37;font-weight:700;">1 人</span></div>
<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(58,106,122,0.3);"><span style="color:#fff;">ARBP</span><span style="color:#d4af37;font-weight:700;">1 人</span></div>
<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(58,106,122,0.3);"><span style="color:#fff;">ATCD</span><span style="color:#d4af37;font-weight:700;">1 人</span></div>
<div style="display:flex;justify-content:space-between;padding:8px 0;"><span style="color:#fff;">IRCD</span><span style="color:#d4af37;font-weight:700;">1 人</span></div>
</div>
</div>

<div id="menu">
<div class="card">
<h3>🧪 仪表盘测试</h3>
<button class="btn btn-gold" onclick="document.getElementById('dashboard').style.display='block';document.getElementById('menu').style.display='none';">📊 打开仪表盘</button>
<button class="btn btn-red" onclick="localStorage.removeItem('currentTeam');alert('已清除');">🗑️ 清除数据</button>
</div>
</div>

<script>
// 自动创建示例团队
var t={name:'示例团队 - 采购精英队',inviteCode:'DEMO1234',members:[{name:'张三',code:'ARCD'},{name:'李四',code:'ITCP'},{name:'王五',code:'ARBP'},{name:'赵六',code:'ATCD'},{name:'钱七',code:'IRCD'}]};
localStorage.setItem('currentTeam',JSON.stringify(t));
</script>
</body>
</html>
