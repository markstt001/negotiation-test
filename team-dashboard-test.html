<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>团队仪表盘测试</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif; 
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%); 
            min-height: 100vh; 
            padding: 20px;
        }
        .container { max-width: 600px; margin: 0 auto; }
        .card { 
            background: rgba(32,58,67,0.7); 
            border-radius: 16px; 
            overflow: hidden; 
            border: 1px solid rgba(58,106,122,0.3);
            margin-bottom: 16px;
        }
        .card-header { 
            background: linear-gradient(135deg, rgba(44,83,100,0.9), rgba(32,58,67,0.9)); 
            padding: 16px 20px; 
            border-bottom: 1px solid #3a6a7a; 
        }
        .card-title { font-size: 15px; font-weight: 700; color: #ffffff; }
        .btn { 
            background: linear-gradient(135deg, #2c5364, #d4af37); 
            color: #0f2027; 
            border: none; 
            padding: 14px 28px; 
            border-radius: 980px; 
            font-size: 14px; font-weight: 600; 
            cursor: pointer; 
            margin: 8px 4px;
        }
        .btn-secondary { 
            background: rgba(44,83,100,0.6); 
            color: #fff; 
            border: 2px solid #3a6a7a; 
        }
        .test-section { 
            background: rgba(32,58,67,0.5); 
            padding: 20px; 
            border-radius: 12px; 
            margin-bottom: 16px;
        }
        .test-title { font-size: 16px; font-weight: 700; color: #d4af37; margin-bottom: 12px; }
        .test-desc { font-size: 13px; color: #cccccc; margin-bottom: 12px; }
        .success { color: #10b981; }
        .error { color: #ef4444; }
        .info { color: #3b82f6; }
    </style>
</head>
<body>
    <div class="container">
        <div style="text-align: center; padding: 40px 0;">
            <h1 style="font-size: 28px; font-weight: 800; color: #fff; margin-bottom: 8px;">🧪 团队仪表盘测试</h1>
            <p style="font-size: 14px; color: #86868b;">版本 v2.0 | 2026-03-28</p>
        </div>
        
        <!-- 测试场景 1: 创建示例团队 -->
        <div class="test-section">
            <div class="test-title">📋 测试场景 1: 创建示例团队</div>
            <div class="test-desc">点击按钮创建包含 5 位成员的示例团队</div>
            <button class="btn" onclick="createDemoTeam()">创建示例团队</button>
            <div id="test1-result" style="margin-top: 12px; font-size: 13px;"></div>
        </div>
        
        <!-- 测试场景 2: 查看仪表盘 -->
        <div class="test-section">
            <div class="test-title">📊 测试场景 2: 查看团队仪表盘</div>
            <div class="test-desc">打开团队仪表盘，查看概览、分析、对比、报告 4 个 Tab</div>
            <button class="btn" onclick="openDashboard()">打开仪表盘</button>
            <div id="test2-result" style="margin-top: 12px; font-size: 13px;"></div>
        </div>
        
        <!-- 测试场景 3: 成员对比 -->
        <div class="test-section">
            <div class="test-title">⚖️ 测试场景 3: 成员对比功能</div>
            <div class="test-desc">在仪表盘中切换到"对比"Tab，选择两位成员进行对比</div>
            <button class="btn" onclick="testComparison()">测试对比</button>
            <div id="test3-result" style="margin-top: 12px; font-size: 13px;"></div>
        </div>
        
        <!-- 测试场景 4: 分析报告 -->
        <div class="test-section">
            <div class="test-title">📑 测试场景 4: 团队分析报告</div>
            <div class="test-desc">验证优势分析、风险识别逻辑</div>
            <button class="btn" onclick="testAnalysis()">测试分析</button>
            <div id="test4-result" style="margin-top: 12px; font-size: 13px;"></div>
        </div>
        
        <!-- 快速操作 -->
        <div class="test-section">
            <div class="test-title">⚡ 快速操作</div>
            <button class="btn" onclick="goToMainPage()">返回主页</button>
            <button class="btn btn-secondary" onclick="clearData()">清除数据</button>
        </div>
        
        <!-- 团队数据预览 -->
        <div class="card">
            <div class="card-header">
                <div class="card-title">📦 当前团队数据</div>
            </div>
            <div style="padding: 16px;">
                <pre id="teamDataPreview" style="font-size: 11px; color: #86868b; white-space: pre-wrap; overflow-x: auto;">暂无数据</pre>
            </div>
        </div>
    </div>
    
    <script src="team-dashboard.js?v=202603280845"></script>
    <script src="team-report.js?v=202603221745"></script>
    <script>
        // 创建示例团队
        function createDemoTeam() {
            var demoTeam = {
                name: '示例团队 - 采购部',
                leader: '粒子',
                inviteCode: 'DEMO' + Math.floor(Math.random() * 10000),
                createdAt: new Date().toISOString(),
                members: [
                    { name: '张三', code: 'ARCD', completed: true, styleName: '数据军师' },
                    { name: '李四', code: 'ITCP', completed: true, styleName: '社交牛人' },
                    { name: '王五', code: 'ARBP', completed: true, styleName: '流程管家' },
                    { name: '赵六', code: 'ATCD', completed: true, styleName: '市场猎手' },
                    { name: '钱七', code: 'IRCD', completed: true, styleName: '直觉玩家' }
                ]
            };
            
            localStorage.setItem('currentTeam', JSON.stringify(demoTeam));
            
            document.getElementById('test1-result').innerHTML = 
                '<span class="success">✅ 示例团队创建成功！</span><br>' +
                '团队名称：' + demoTeam.name + '<br>' +
                '邀请码：' + demoTeam.inviteCode + '<br>' +
                '成员数：' + demoTeam.members.length + '人';
            
            updateTeamDataPreview();
        }
        
        // 打开仪表盘
        function openDashboard() {
            var savedTeam = localStorage.getItem('currentTeam');
            if (!savedTeam) {
                document.getElementById('test2-result').innerHTML = 
                    '<span class="error">❌ 请先创建团队</span>';
                return;
            }
            
            var team = JSON.parse(savedTeam);
            goToTeamDashboard();
            
            document.getElementById('test2-result').innerHTML = 
                '<span class="success">✅ 仪表盘已打开！</span><br>' +
                '请在新页面中查看：<br>' +
                '• 概览 Tab - 团队概况、风格分布、成员列表<br>' +
                '• 分析 Tab - 四维度分析、优势、风险<br>' +
                '• 对比 Tab - 成员对比<br>' +
                '• 报告 Tab - 团队配置报告';
        }
        
        // 测试对比功能
        function testComparison() {
            var savedTeam = localStorage.getItem('currentTeam');
            if (!savedTeam) {
                document.getElementById('test3-result').innerHTML = 
                    '<span class="error">❌ 请先创建团队</span>';
                return;
            }
            
            var team = JSON.parse(savedTeam);
            var members = team.members.filter(m => m.code && m.code.length === 4);
            
            if (members.length < 2) {
                document.getElementById('test3-result').innerHTML = 
                    '<span class="error">❌ 需要至少 2 位已测试成员</span>';
                return;
            }
            
            var comparison = generateMemberComparison(members[0], members[1]);
            
            document.getElementById('test3-result').innerHTML = 
                '<span class="success">✅ 对比分析生成成功！</span><br><br>' +
                '<strong>对比成员：</strong>' + members[0].name + ' (' + members[0].code + ') vs ' + 
                members[1].name + ' (' + members[1].code + ')<br><br>' +
                '<strong>互补性：</strong>' + comparison.complementarity + '<br><br>' +
                '<strong>协作优势：</strong>' + comparison.strengths + '<br><br>' +
                '<strong>注意事项：</strong>' + comparison.caution;
        }
        
        // 测试分析功能
        function testAnalysis() {
            var savedTeam = localStorage.getItem('currentTeam');
            if (!savedTeam) {
                document.getElementById('test4-result').innerHTML = 
                    '<span class="error">❌ 请先创建团队</span>';
                return;
            }
            
            var team = JSON.parse(savedTeam);
            var members = team.members.filter(m => m.code && m.code.length === 4);
            
            if (members.length === 0) {
                document.getElementById('test4-result').innerHTML = 
                    '<span class="error">❌ 没有已测试成员</span>';
                return;
            }
            
            var dimensions = calculateDimensionDistribution(members);
            var advantages = generateTeamAdvantages(dimensions);
            var risks = generateTeamRisks(dimensions);
            var teamType = analyzeTeamType(dimensions, members.length);
            
            var html = '<span class="success">✅ 分析报告生成成功！</span><br><br>';
            html += '<strong>团队类型：</strong>' + teamType.name + '<br>' +
                    teamType.desc + '<br><br>';
            html += '<strong>团队优势：</strong><br>';
            advantages.forEach(function(a) {
                html += '• ' + a.title + ' - ' + a.desc + '<br>';
            });
            html += '<br><strong>潜在风险：</strong><br>';
            risks.forEach(function(r) {
                html += '• ' + r.title + ' - ' + r.desc + '<br>';
                html += '  ⚠️ ' + r.risk + '<br>';
            });
            
            document.getElementById('test4-result').innerHTML = html;
        }
        
        // 更新数据预览
        function updateTeamDataPreview() {
            var savedTeam = localStorage.getItem('currentTeam');
            if (savedTeam) {
                var team = JSON.parse(savedTeam);
                document.getElementById('teamDataPreview').textContent = 
                    JSON.stringify(team, null, 2);
            } else {
                document.getElementById('teamDataPreview').textContent = '暂无数据';
            }
        }
        
        // 返回主页
        function goToMainPage() {
            window.location.href = 'index.html';
        }
        
        // 清除数据
        function clearData() {
            if (confirm('确定要清除所有团队数据吗？')) {
                localStorage.removeItem('currentTeam');
                localStorage.removeItem('teamReportPurchased');
                alert('数据已清除！');
                document.getElementById('teamDataPreview').textContent = '暂无数据';
                document.querySelectorAll('[id$="-result"]').forEach(function(el) {
                    el.innerHTML = '';
                });
            }
        }
        
        // 页面加载时更新预览
        updateTeamDataPreview();
    </script>
</body>
</html>
